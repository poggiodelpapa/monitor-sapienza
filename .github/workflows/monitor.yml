name: Monitora Pagina Sapienza

on:
  schedule:
    - cron: "0 * * * *" # Gira ogni ora in automatico
  workflow_dispatch: # Ti permette di lanciarlo a mano per testare

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Recupera l'ultimo hash salvato nella cache di GitHub
      - name: Ripristina Cache Hash
        uses: actions/cache/restore@v4
        with:
          path: last_hash.txt
          key: sapienza-hash-${{ github.run_id }}
          restore-keys: |
            sapienza-hash-

      - name: Installa dipendenze
        run: pip install requests beautifulsoup4

      - name: Esegui monitor
        env:
          EMAIL_MITTENTE: ${{ secrets.EMAIL_MITTENTE }}
          EMAIL_DESTINATARIO: ${{ secrets.EMAIL_DESTINATARIO }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          # IMPOSTA SU "false" DOPO CHE HAI RICEVUTO L'EMAIL DI PROVA
          FORCE_EMAIL: "true" 
        run: python monitor.py

      # Salva il nuovo hash nella cache per la prossima esecuzione
      - name: Salva Cache Hash
        uses: actions/cache/save@v4
        if: always()
        with:
          path: last_hash.txt
          key: sapienza-hash-${{ github.run_id }}
