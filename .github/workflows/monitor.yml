name: Monitora Pagina Sapienza

on:
  schedule:
    - cron: "0 * * * *"     # ogni ora (puoi cambiarlo, es. ogni 6 ore: "0 */6 * * *")
  workflow_dispatch:        # permette di lanciare manualmente se serve

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ripristina Cache (last_hash)
        uses: actions/cache/restore@v4
        with:
          path: last_hash.txt
          key: last-hash

      - name: Installa dipendenze
        run: pip install requests beautifulsoup4

      - name: Esegui monitor
        env:
          EMAIL_MITTENTE: ${{ secrets.EMAIL_MITTENTE }}
          EMAIL_DESTINATARIO: ${{ secrets.EMAIL_DESTINATARIO }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python monitor.py

      - name: Salva Cache (last_hash)
        uses: actions/cache/save@v4
        if: always()
        with:
          path: last_hash.txt
          key: last-hash
